version: '3.8'

services:
  enyalien:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enyalien_app
    ports:
      - "8000:8000"
    volumes:
      - enyalien_data:/data
    environment:
      - DATABASE_URL=sqlite:////data/enyalien.db
    restart: unless-stopped

volumes:
  enyalien_data:
